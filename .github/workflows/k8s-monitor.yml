name: K8s Cluster Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    steps:
      - name: Create SSH tunnel to K8s cluster
        run: |
          # Поднимаем туннель через Bastion
          ssh -f -N -L 6443:127.0.0.1:6443 -o ProxyJump=jump_sa@178.124.206.53:32511 root@192.168.208.11
          sleep 3
          echo "Tunnel created"
          
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          cat > ~/.kube/config << 'KUBECONFIG'
apiVersion: v1
clusters:
- cluster:
    server: https://localhost:6443
    insecure-skip-tls-verify: true
  name: cluster
contexts:
- context:
    cluster: cluster
    user: admin
  name: cluster
current-context: cluster
kind: Config
users:
- name: admin
KUBECONFIG
          
      - name: Check cluster
        run: |
          kubectl get nodes
          kubectl get pods -A
          
      - name: Close tunnel
        if: always()
        run: pkill -f "ssh -f -N -L 6443" || true
