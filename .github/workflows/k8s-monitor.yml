name: K8s Pods Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    env:
      KUBECONFIG: /home/nik/.kube/config-k3s:/home/nik/.kube/config-k8s
    steps:
      - name: Show kubeconfig path
        run: |
          echo "KUBECONFIG=$KUBECONFIG"
          ls -la ${{ env.KUBECONFIG }} || echo "Files not found"
      
      - name: Show current context
        run: |
          kubectl config get-contexts
          kubectl config current-context
      
      - name: Check pods status
        run: |
          echo "=== Checking K8s cluster from $(hostname) ==="
          echo "Time: $(date)"
          echo ""
          echo "=== All pods ==="
          kubectl get pods -A
          
          FAILED=$(kubectl get pods -A --no-headers | grep -E "CrashLoopBackOff|Error|Failed|ImagePullBackOff" || true)
          
          if [ -n "$FAILED" ]; then
            echo "❌❌❌ PROBLEM DETECTED! ❌❌❌"
            echo "$FAILED"
            exit 1
          else
            echo "✅✅✅ ALL PODS ARE HEALTHY ✅✅✅"
          fi
      
      - name: Show nodes info
        run: |
          echo "=== Nodes ==="
          kubectl get nodes -o wide
