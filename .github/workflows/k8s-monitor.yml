name: K8s Pods Monitor

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    steps:
      - name: Check pods
        run: |
          kubectl get pods -A
          FAILED=$(kubectl get pods -A --no-headers | grep -E "CrashLoopBackOff|Error|Failed|ImagePullBackOff" || true)
          if [ -n "$FAILED" ]; then
            echo "❌ Unhealthy pods found"
            exit 1
          else
            echo "✅ All pods healthy"
          fi
